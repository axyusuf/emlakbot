name: Keep Alive

on:
  schedule:
    - cron: '*/5 * * * *'   # Her 5 dakikada bir (Render 15dk'da uyur, 5dk güvenli)
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping EmlakBot
        run: |
          for i in 1 2 3; do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" --max-time 30 https://emlakbot-g25d.onrender.com/healthz)
            echo "Deneme $i - HTTP $STATUS"
            if [ "$STATUS" = "200" ]; then
              echo "Site aktif ✅"
              exit 0
            fi
            sleep 10
          done
          echo "Site yanıt vermedi ⚠️"

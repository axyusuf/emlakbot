name: Keep Alive

on:
  schedule:
    - cron: '*/14 * * * *'  # Her 14 dakikada bir
  workflow_dispatch:         # Manuel çalıştırma için

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping EmlakBot
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" https://emlakbot-g25d.onrender.com/healthz)
          echo "Site durumu: $STATUS"
          if [ "$STATUS" = "200" ]; then
            echo "Site aktif ve çalışıyor ✅"
          else
            echo "Site yanıt vermiyor ⚠️ (HTTP $STATUS)"
          fi

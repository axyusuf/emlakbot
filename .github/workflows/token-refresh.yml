name: WhatsApp Token Yenile

on:
  schedule:
    - cron: '0 3 1 * *'  # Her ayın 1'inde saat 03:00
  workflow_dispatch:       # Manuel çalıştırma

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - name: Mevcut token'ı Render'dan al ve yenile
        env:
          APP_ID: ${{ secrets.WA_APP_ID }}
          APP_SECRET: ${{ secrets.WA_APP_SECRET }}
          RENDER_API_KEY: ${{ secrets.RENDER_API_KEY_GH }}
          RENDER_SERVICE_ID: ${{ secrets.RENDER_SERVICE_ID_GH }}
        run: |
          echo "Render'dan mevcut token alınıyor..."
          ENV_VARS=$(curl -s "https://api.render.com/v1/services/$RENDER_SERVICE_ID/env-vars" \
            -H "Authorization: Bearer $RENDER_API_KEY")

          CURRENT_TOKEN=$(echo $ENV_VARS | python3 -c "
          import sys, json
          items = json.load(sys.stdin)
          for item in items:
              if item['envVar']['key'] == 'WHATSAPP_TOKEN':
                  print(item['envVar']['value'])
                  break
          ")

          echo "Token alındı, 60 günlük yenisi oluşturuluyor..."
          RESPONSE=$(curl -s "https://graph.facebook.com/oauth/access_token?grant_type=fb_exchange_token&client_id=$APP_ID&client_secret=$APP_SECRET&fb_exchange_token=$CURRENT_TOKEN")

          NEW_TOKEN=$(echo $RESPONSE | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('access_token',''))")
          EXPIRES=$(echo $RESPONSE | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('expires_in',0))")

          if [ -z "$NEW_TOKEN" ]; then
            echo "Hata: Yeni token alınamadı!"
            echo "Yanıt: $RESPONSE"
            exit 1
          fi

          echo "Yeni token alındı. Süre: $EXPIRES saniye (~$(($EXPIRES/86400)) gün)"
          echo "Render'a yazılıyor..."

          PUT_BODY=$(echo $ENV_VARS | python3 -c "
          import sys, json
          import os
          new_token = os.environ['NEW_TOKEN']
          items = json.load(sys.stdin)
          result = []
          for item in items:
              ev = item['envVar']
              if ev['key'] == 'WHATSAPP_TOKEN':
                  result.append({'key': 'WHATSAPP_TOKEN', 'value': new_token})
              else:
                  result.append({'key': ev['key'], 'value': ev.get('value','')})
          print(json.dumps(result))
          " NEW_TOKEN="$NEW_TOKEN")

          STATUS=$(curl -s -o /dev/null -w "%{http_code}" -X PUT \
            "https://api.render.com/v1/services/$RENDER_SERVICE_ID/env-vars" \
            -H "Authorization: Bearer $RENDER_API_KEY" \
            -H "Content-Type: application/json" \
            -d "$PUT_BODY")

          if [ "$STATUS" = "200" ]; then
            echo "WhatsApp token başarıyla yenilendi ✅"
          else
            echo "Render güncelleme hatası: HTTP $STATUS"
            exit 1
          fi
